# Enable Powerline
set-option -g status-position top
set -g default-terminal "tmux-256color"

# Change refreshing tmux config 
unbind r
bind r source-file ~/.tmux.conf

# Change to Ctrl + S instead of Ctrl + B
set -g prefix C-s

# Resize panes with the mosue
set -g mouse on

# Start windows and panes at index 1
set -g base-index 1
set-window-option -g pane-base-index 1
set -g renumber-windows on

# Use HJKL for Left, Down, Up, Right instead of the arrow keys
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Index windows starting from 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1

# List of Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# TMUX Plugin Manager
run '~/.config/tmux/plugins/tpm/tpm'
